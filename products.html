<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Collection | X-Tech Accessories B2B Catalog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { 
            techblue: '#00D2FF', 
            esrdark: '#1C1C1C', 
            esrgrey: '#707072',
            esrlight: '#F5F5F7'
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-white text-esrdark font-sans antialiased">
  <header class="sticky top-0 z-50 bg-white bg-opacity-90 backdrop-blur-md border-b border-gray-100 h-20 flex items-center">
    <div class="max-w-7xl mx-auto px-6 w-full flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-1">
        <span class="text-2xl font-extrabold tracking-tighter uppercase italic">X-TECH</span>
      </a>
      <nav class="hidden md:flex gap-10 text-[11px] font-bold uppercase tracking-widest text-esrdark">
        <a href="index.html">Home</a>
        <a href="products.html" class="text-techblue">Catalog</a>
        <a href="projects.html">OEM Case</a>
        <a href="inquiry.html">Inquiry</a>
      </nav>
      <div id="inquiry-badge" class="bg-techblue text-white rounded-full w-5 h-5 flex items-center justify-center text-[9px] font-bold hidden">0</div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-20 lg:py-32">
    <div class="flex flex-col lg:flex-row justify-between items-end gap-8 mb-20">
      <div class="space-y-4">
        <span class="text-techblue text-[10px] font-bold uppercase tracking-widest">2026 Magnetic Ecosystem</span>
        <h1 class="text-5xl lg:text-7xl font-extrabold text-esrdark tracking-tighter uppercase italic">Factory Direct Catalog.</h1>
      </div>
      <div class="text-right hidden lg:block">
        <p class="text-esrgrey font-medium text-sm max-w-xs">Global wholesale distribution and OEM/ODM services for magnetic mounting solutions.</p>
      </div>
    </div>

    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12 text-esrdark">
      <!-- Products injected here -->
    </div>
  </main>

  <footer class="bg-esrlight py-20 border-t border-gray-200 text-center">
    <div class="text-[10px] font-bold uppercase tracking-[0.3em] text-esrgrey">
      &copy; 2026 X-Tech Accessories &bull; B2B Global Solutions
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="shared.js"></script>
  <script>
    const grid = document.getElementById('grid');
    grid.innerHTML = PRODUCTS.map(p => `
      <div class="group bg-white border border-gray-100 rounded-[2.5rem] p-8 hover:border-techblue hover:shadow-xl transition-all duration-500">
        <div class="aspect-[4/3] rounded-[2rem] overflow-hidden mb-8 bg-esrlight relative border border-gray-100">
          <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700 grayscale group-hover:grayscale-0">
          <div class="absolute top-4 right-4 bg-esrdark text-white text-[9px] font-bold px-3 py-1 rounded-full uppercase">MOQ 500</div>
        </div>
        <span class="text-[9px] font-bold text-techblue uppercase tracking-[0.2em]">${p.technique}</span>
        <h3 class="text-2xl font-extrabold text-esrdark mt-4 group-hover:text-techblue transition-colors uppercase italic">${p.name}</h3>
        <p class="text-esrgrey text-xs mt-4 line-clamp-2 font-medium">${p.description}</p>
        <div class="mt-8 flex gap-4">
          <a href="product-details.html?id=${p.id}" class="flex-1 bg-esrdark text-white text-[10px] font-bold py-4 rounded-2xl text-center hover:bg-techblue hover:text-white transition-colors uppercase tracking-widest">View Details</a>
          <button onclick="addToInquiry('${p.id}', '${p.name}', '${p.category}', '${p.image}')" class="w-14 h-14 border border-gray-200 rounded-2xl flex items-center justify-center hover:border-techblue hover:text-techblue transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          </button>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
